name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        working-directory: ./app

      - name: Run Tests
        run: npm test
        working-directory: ./app

      # 🔐 Login
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build
      - name: Build Image
        run: docker build -t harness-project:latest -f docker/Dockerfile .

      # 🏷️ Tag (VERY IMPORTANT)
      - name: Tag Image
        run: docker tag harness-project:latest baraishubham78/harness-project:latest

      # 🚀 Push
      - name: Push Image
        run: docker push baraishubham78/harness-project:latest