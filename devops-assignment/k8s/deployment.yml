apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: devops-container
        image: devops-app:latest
        imagePullPolicy: Never   # IMPORTANT for local
        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10